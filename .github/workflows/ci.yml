name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-auth-secret
      AUTH_GOOGLE_ID: ci-google-id
      AUTH_GOOGLE_SECRET: ci-google-secret
      DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/cinecircle
      NEXT_PUBLIC_APP_NAME: CineCircle
      RESEND_API_KEY: ci-resend-key
      RESEND_FROM_EMAIL: cinecircle@example.com
      TMDB_API_KEY: ci-tmdb-key
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Verify code
        run: npm run verify

      - name: Build application
        run: npm run build

      - name: Ensure build does not modify tracked files
        run: git diff --exit-code -- . ':(exclude)generated/prisma'

      - name: Check required artifacts on pull requests
        if: github.event_name == 'pull_request'
        run: bash ./scripts/check-required-artifacts.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

      - name: Check required artifacts on pushes
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: bash ./scripts/check-required-artifacts.sh "${{ github.event.before }}" "${{ github.sha }}"
